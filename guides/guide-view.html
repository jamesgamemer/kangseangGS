<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide</title>
  <link rel="stylesheet" href="../css/guide-system.css">
  <style>
    body {
      background: #0f1117;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .guide-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .guide-breadcrumb {
      margin-bottom: 20px;
      font-size: 14px;
    }

    .guide-breadcrumb a {
      color: #00a8ff;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .guide-breadcrumb a:hover {
      opacity: 0.8;
    }

    .guide-breadcrumb span {
      color: #b0b0b0;
      margin: 0 8px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #b0b0b0;
    }

    .error {
      background: rgba(244, 67, 54, 0.1);
      border-left: 4px solid #f44336;
      padding: 20px;
      border-radius: 8px;
      color: #ff6b6b;
      margin: 20px 0;
    }

    .guide-actions {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
    }

    .guide-action-btn {
      padding: 10px 20px;
      background: #232734;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #ffffff;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .guide-action-btn:hover {
      background: #00a8ff;
      color: #000;
      border-color: #00a8ff;
    }

    .guide-action-btn.edit {
      background: #00a8ff;
      color: #000;
      border-color: #00a8ff;
    }

    .guide-action-btn.edit:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="guide-container">
    <div class="guide-breadcrumb">
      <a href="../guides.html">← Back to Guides</a>
    </div>

    <div id="guide-content" class="loading">
      <p>Loading guide...</p>
    </div>

    <div class="guide-actions">
      <a href="../admin/guide-editor.html" class="guide-action-btn edit">Edit Guide</a>
      <button class="guide-action-btn" onclick="window.print()">Print Guide</button>
    </div>
  </div>

  <script src="../components/block-system.js"></script>
  <script src="../components/guide-renderer.js"></script>
  <script src="../js/guide-view.js"></script>
</body>
</html>
