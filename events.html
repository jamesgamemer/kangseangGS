<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - 7DS Origin</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/navbar-auth.css">
  <style>
    .page-header {
      background: linear-gradient(180deg, #0d1f4a 0%, var(--dark2) 100%);
      padding: 80px 20px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(96,165,250,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,165,250,0.05) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .page-header-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px var(--glow-gold);
      position: relative; z-index: 1;
    }
    .page-header-sub {
      color: var(--muted);
      font-size: 15px;
      letter-spacing: 2px;
      margin-top: 12px;
      position: relative; z-index: 1;
    }
    .filter-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }
    .filter-tab {
      padding: 9px 22px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--dark3);
      color: var(--muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
    }
    .filter-tab:hover, .filter-tab.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(240,192,64,0.08);
    }
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .event-card {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      position: relative;
    }
    .event-card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
      box-shadow: 0 10px 30px rgba(240,192,64,0.15);
    }
    .event-card-banner { height: 8px; }
    .event-card-body { padding: 24px; }
    .event-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .status-active   { background: rgba(11,232,129,0.15); color: #0be881; }
    .status-upcoming { background: rgba(59,130,246,0.15);  color: var(--blue); }
    .status-ended    { background: rgba(148,163,184,0.15); color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status-active .status-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }
    .event-title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      color: white;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .event-tag-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .tag-event { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .tag-update { background: rgba(240,192,64,0.2); color: #f0c040; }
    .tag-guide { background: rgba(52,211,153,0.2); color: #34d399; }
    .tag-maintenance { background: rgba(244,114,182,0.2); color: #f472b6; }
    .event-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 16px;
    }
    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .event-rewards { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
    .reward-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      background: rgba(240,192,64,0.12);
      color: var(--gold);
      border: 1px solid rgba(240,192,64,0.25);
      font-weight: 600;
    }
    .countdown { display: flex; gap: 12px; margin-top: 14px; }
    .cd-block {
      text-align: center;
      background: var(--panel);
      border-radius: 8px;
      padding: 8px 12px;
      min-width: 52px;
    }
    .cd-num {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      display: block;
    }
    .cd-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* Admin edit buttons on cards */
    .event-admin-actions {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 2;
    }
    .event-admin-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--dark2);
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .event-admin-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(240,192,64,0.1);
    }
    .event-admin-btn.delete-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: rgba(239,68,68,0.1);
    }

    /* Event Form Modal */
    .event-form-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .event-form-modal {
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .efm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .efm-header h2 {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold);
      margin: 0;
    }
    .efm-close {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .efm-close:hover { color: #ef4444; border-color: #ef4444; }
    .efm-body { padding: 24px; }
    .efm-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }
    .efm-group { margin-bottom: 16px; }
    .efm-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .efm-group input, .efm-group textarea, .efm-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--dark3);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      box-sizing: border-box;
    }
    .efm-group input:focus, .efm-group textarea:focus, .efm-group select:focus {
      outline: none;
      border-color: var(--gold);
    }
    .efm-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .reward-item {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .reward-item input { flex: 1; }
    .reward-remove {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .reward-remove:hover { color: #ef4444; border-color: #ef4444; }
    .add-reward-btn {
      padding: 6px 14px;
      border: 1px dashed var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-reward-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Admin add button */
    .admin-add-event-bar {
      display: none;
      justify-content: center;
      margin-bottom: 24px;
    }

    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body>

  <!-- Admin Bar -->
  <div class="admin-bar" id="adminBar" style="display:none;">
    <div class="admin-bar-left">
      <span class="admin-badge">ADMIN</span>
      <a href="admin.html" class="admin-bar-link">Dashboard</a>
    </div>
    <div class="admin-bar-right">
      <button class="admin-bar-btn" onclick="Auth.logout()">Logout</button>
    </div>
  </div>

  <nav class="navbar">
    <a href="index.html" class="navbar-logo">7DS<span>Origin</span></a>
    <div class="navbar-hamburger" id="navHam"><span></span><span></span><span></span></div>
    <ul class="navbar-links" id="navLinks">
      <li><a href="index.html">&#127968; Home</a></li>
      <li><a href="characters.html">&#9876; Characters</a></li>
      <li><a href="tierlist.html">&#127942; Tier List</a></li>
      <li><a href="events.html" class="active">&#127881; Events</a></li>
    </ul>
  </nav>

  <div class="page-content">
    <div class="page-header">
      <div class="page-header-title">&#127881; Events</div>
      <div class="page-header-sub">Current &amp; Upcoming In-Game Events</div>
    </div>

    <div class="container">
      <!-- Admin: Add Event Button -->
      <div class="admin-add-event-bar" id="adminAddEventBar">
        <button class="btn btn-gold" onclick="showEventForm()">+ Add New Event</button>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterEvents('all',this)">All</button>
        <button class="filter-tab" onclick="filterEvents('active',this)">Active</button>
        <button class="filter-tab" onclick="filterEvents('upcoming',this)">Upcoming</button>
        <button class="filter-tab" onclick="filterEvents('ended',this)">Ended</button>
      </div>
      <div class="events-grid" id="eventsGrid"></div>
    </div>
  </div>

  <!-- Event Edit Modal -->
  <div class="event-form-overlay" id="eventFormOverlay" onclick="if(event.target===this)hideEventForm()">
    <div class="event-form-modal">
      <div class="efm-header">
        <h2 id="efmTitle">Add New Event</h2>
        <button class="efm-close" onclick="hideEventForm()">&times;</button>
      </div>
      <div class="efm-body">
        <input type="hidden" id="efmEditId">
        <div class="efm-group">
          <label>Event Title *</label>
          <input type="text" id="efmEventTitle" placeholder="e.g. Holy War Raid">
        </div>
        <div class="efm-group">
          <label>Description *</label>
          <textarea id="efmEventDesc" rows="3" placeholder="Event description..."></textarea>
        </div>
        <div class="efm-row">
          <div class="efm-group">
            <label>Status</label>
            <select id="efmEventStatus">
              <option value="active">Active</option>
              <option value="upcoming">Upcoming</option>
              <option value="ended">Ended</option>
            </select>
          </div>
          <div class="efm-group">
            <label>Tag</label>
            <select id="efmEventTag">
              <option value="event">Event</option>
              <option value="update">Update</option>
              <option value="guide">Guide</option>
              <option value="maintenance">Maintenance</option>
            </select>
          </div>
        </div>
        <div class="efm-row">
          <div class="efm-group">
            <label>Start Date</label>
            <input type="date" id="efmEventStart">
          </div>
          <div class="efm-group">
            <label>End Date</label>
            <input type="date" id="efmEventEnd">
          </div>
        </div>
        <div class="efm-group">
          <label>Banner Color (CSS)</label>
          <input type="text" id="efmEventColor" placeholder="linear-gradient(90deg,#3b82f6,#60a5fa)" value="linear-gradient(90deg,#3b82f6,#60a5fa)">
        </div>
        <div class="efm-group">
          <label>Rewards</label>
          <div id="efmRewardsEditor"></div>
          <button type="button" class="add-reward-btn" onclick="addRewardField()">+ Add Reward</button>
        </div>
      </div>
      <div class="efm-footer">
        <button class="btn btn-outline" onclick="hideEventForm()">Cancel</button>
        <button class="btn btn-gold" onclick="saveEvent()">Save Event</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>7DS Origin Database &mdash; Fan-made site &mdash; Not affiliated with Netmarble</p>
    <p style="margin-top:8px;">
      <a href="index.html">Home</a> &nbsp;&bull;&nbsp;
      <a href="characters.html">Characters</a> &nbsp;&bull;&nbsp;
      <a href="tierlist.html">Tier List</a> &nbsp;&bull;&nbsp;
      <a href="events.html">Events</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script>
    var allEvents = [];
    var currentFilter = 'all';
    var isAdmin = false;
    var editingEventId = null;

    /* ── Load/Save Events from localStorage ── */
    function loadEvents() {
      var stored = localStorage.getItem('7ds_events');
      if (stored) {
        try { allEvents = JSON.parse(stored); } catch(e) { allEvents = getDefaultEvents(); }
      } else {
        allEvents = getDefaultEvents();
      }
    }

    function saveEvents() {
      localStorage.setItem('7ds_events', JSON.stringify(allEvents));
    }

    function getDefaultEvents() {
      return [
        { id:1, status:'active', tag:'event', title:'Holy War Raid', desc:'Team up with allies to defeat the Demon King in the limited-time Holy War Raid. Earn exclusive SSR shards and rare equipment.', start:'2026-03-01', end:'2026-03-15', color:'linear-gradient(90deg,#3b82f6,#60a5fa)', rewards:['SSR Shard x3','Gold x50,000','Raid Medal x20'] },
        { id:2, status:'active', tag:'update', title:'New Character: Tristan', desc:'The son of Meliodas and Elizabeth joins the battle. Limited banner available for a short time with boosted SSR rates.', start:'2026-03-05', end:'2026-03-20', color:'linear-gradient(90deg,#f0c040,#ffd966)', rewards:['Tristan SSR','Summon Ticket x10','Gems x500'] },
        { id:3, status:'active', tag:'event', title:'Daily Login Bonus', desc:'Log in every day during March to collect cumulative rewards including gems, tickets, and rare materials.', start:'2026-03-01', end:'2026-03-31', color:'linear-gradient(90deg,#0be881,#34d399)', rewards:['Gems x1,200','Summon Ticket x5','EXP Potion x30'] },
        { id:4, status:'upcoming', tag:'event', title:'Guild War Season 4', desc:'Compete against guilds worldwide in the new Guild War season. Climb the leaderboard to earn exclusive guild rewards.', start:'2026-03-20', end:'2026-04-05', color:'linear-gradient(90deg,#a78bfa,#c4b5fd)', rewards:['Guild Crest','Gems x2,000','Exclusive Title'] },
        { id:5, status:'upcoming', tag:'event', title:'Spring Festival', desc:'Celebrate the spring season with special story quests, limited cosmetics, and a special gacha banner featuring seasonal costumes.', start:'2026-03-25', end:'2026-04-10', color:'linear-gradient(90deg,#f472b6,#fb7185)', rewards:['Spring Costume','Gems x800','Flower Tokens x100'] },
        { id:6, status:'ended', tag:'event', title:"Valentine's Day Event", desc:"A special event celebrating Valentine's Day with exclusive story content and limited cosmetics.", start:'2026-02-10', end:'2026-02-28', color:'linear-gradient(90deg,#f43f5e,#fb7185)', rewards:['Heart Charm','Gems x600','Valentine Frame'] },
      ];
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        var d = new Date(dateStr + 'T00:00:00');
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      } catch(e) { return dateStr; }
    }

    /* ── Filter ── */
    function filterEvents(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.filter-tab').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      renderEvents();
    }

    /* ── Render ── */
    function renderEvents() {
      var grid = document.getElementById('eventsGrid');
      var filtered = currentFilter === 'all' ? allEvents : allEvents.filter(function(e){ return e.status === currentFilter; });

      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);"><p style="font-size:48px;margin-bottom:16px;">&#127881;</p><p>No events found</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(function(ev) {
        var statusLabel = ev.status === 'active' ? 'Active' : ev.status === 'upcoming' ? 'Upcoming' : 'Ended';
        var statusCls = 'status-' + ev.status;
        var tagCls = 'tag-' + (ev.tag || 'event');
        var tagLabel = (ev.tag || 'event').charAt(0).toUpperCase() + (ev.tag || 'event').slice(1);
        var rewardTags = (ev.rewards || []).map(function(r){ return '<span class="reward-tag">'+escHtml(r)+'</span>'; }).join('');

        var adminBtns = '';
        if (isAdmin) {
          adminBtns = '<div class="event-admin-actions">' +
            '<button class="event-admin-btn" onclick="editEvent('+ev.id+')" title="Edit">&#9998;</button>' +
            '<button class="event-admin-btn delete-btn" onclick="deleteEvent('+ev.id+')" title="Delete">&#128465;</button>' +
            '</div>';
        }

        var countdownHTML = '';
        if (ev.status !== 'ended' && ev.end) {
          var endDate = new Date(ev.end + 'T23:59:59');
          var now = new Date();
          var diff = endDate - now;
          if (diff > 0) {
            var days  = Math.floor(diff / 86400000);
            var hours = Math.floor((diff % 86400000) / 3600000);
            var mins  = Math.floor((diff % 3600000) / 60000);
            var secs  = Math.floor((diff % 60000) / 1000);
            countdownHTML = '<div style="font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:14px;text-transform:uppercase;">Time Remaining</div>'
              + '<div class="countdown">'
              + '<div class="cd-block"><span class="cd-num" id="cd-d-'+ev.id+'">'+days+'</span><span class="cd-label">Days</span></div>'
              + '<div class="cd-block"><span class="cd-num" id="cd-h-'+ev.id+'">'+hours+'</span><span class="cd-label">Hrs</span></div>'
              + '<div class="cd-block"><span class="cd-num" id="cd-m-'+ev.id+'">'+mins+'</span><span class="cd-label">Min</span></div>'
              + '<div class="cd-block"><span class="cd-num" id="cd-s-'+ev.id+'">'+secs+'</span><span class="cd-label">Sec</span></div>'
              + '</div>';
          }
        }

        return '<div class="event-card reveal" data-status="'+ev.status+'">'
          + adminBtns
          + '<div class="event-card-banner" style="background:'+(ev.color||'var(--dark3)')+';"></div>'
          + '<div class="event-card-body">'
          + '<div class="event-status '+statusCls+'"><span class="status-dot"></span>'+statusLabel+'</div>'
          + '<span class="event-tag-badge '+tagCls+'">'+tagLabel+'</span>'
          + '<div class="event-title">'+escHtml(ev.title)+'</div>'
          + '<div class="event-desc">'+escHtml(ev.desc)+'</div>'
          + '<div class="event-meta"><div>&#128197; '+formatDate(ev.start)+'</div><div>&#8594; '+formatDate(ev.end)+'</div></div>'
          + '<div class="event-rewards">'+rewardTags+'</div>'
          + countdownHTML
          + '</div></div>';
      }).join('');

      // Reveal animation
      var obs = new IntersectionObserver(function(entries){
        entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.08 });
      document.querySelectorAll('.event-card.reveal').forEach(function(el){ obs.observe(el); });
    }

    function escHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ── Event Form (CRUD) ── */
    function showEventForm(id) {
      editingEventId = id || null;
      if (id) {
        var ev = allEvents.find(function(e) { return e.id === id; });
        if (!ev) return;
        document.getElementById('efmTitle').textContent = 'Edit Event';
        document.getElementById('efmEditId').value = id;
        document.getElementById('efmEventTitle').value = ev.title || '';
        document.getElementById('efmEventDesc').value = ev.desc || '';
        document.getElementById('efmEventStatus').value = ev.status || 'active';
        document.getElementById('efmEventTag').value = ev.tag || 'event';
        document.getElementById('efmEventStart').value = ev.start || '';
        document.getElementById('efmEventEnd').value = ev.end || '';
        document.getElementById('efmEventColor').value = ev.color || 'linear-gradient(90deg,#3b82f6,#60a5fa)';
        var rh = '';
        (ev.rewards || []).forEach(function(r) {
          rh += '<div class="reward-item"><input type="text" class="efm-reward-input" value="'+r.replace(/"/g,'&quot;')+'"><button class="reward-remove" onclick="this.parentElement.remove();">&times;</button></div>';
        });
        document.getElementById('efmRewardsEditor').innerHTML = rh;
      } else {
        document.getElementById('efmTitle').textContent = 'Add New Event';
        document.getElementById('efmEditId').value = '';
        document.getElementById('efmEventTitle').value = '';
        document.getElementById('efmEventDesc').value = '';
        document.getElementById('efmEventStatus').value = 'active';
        document.getElementById('efmEventTag').value = 'event';
        document.getElementById('efmEventStart').value = '';
        document.getElementById('efmEventEnd').value = '';
        document.getElementById('efmEventColor').value = 'linear-gradient(90deg,#3b82f6,#60a5fa)';
        document.getElementById('efmRewardsEditor').innerHTML = '';
        addRewardField();
      }
      document.getElementById('eventFormOverlay').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function hideEventForm() {
      document.getElementById('eventFormOverlay').style.display = 'none';
      document.body.style.overflow = '';
    }

    function addRewardField() {
      var div = document.createElement('div');
      div.className = 'reward-item';
      div.innerHTML = '<input type="text" class="efm-reward-input" placeholder="e.g. Gems x500"><button class="reward-remove" onclick="this.parentElement.remove();">&times;</button>';
      document.getElementById('efmRewardsEditor').appendChild(div);
    }

    function editEvent(id) {
      showEventForm(id);
    }

    function saveEvent() {
      var title = document.getElementById('efmEventTitle').value.trim();
      if (!title) { alert('Title is required'); return; }

      var rewards = [];
      document.querySelectorAll('.efm-reward-input').forEach(function(input) {
        if (input.value.trim()) rewards.push(input.value.trim());
      });

      var eventData = {
        title: title,
        desc: document.getElementById('efmEventDesc').value,
        status: document.getElementById('efmEventStatus').value,
        tag: document.getElementById('efmEventTag').value,
        start: document.getElementById('efmEventStart').value,
        end: document.getElementById('efmEventEnd').value,
        color: document.getElementById('efmEventColor').value,
        rewards: rewards
      };

      if (editingEventId) {
        var idx = allEvents.findIndex(function(e) { return e.id === editingEventId; });
        if (idx !== -1) {
          eventData.id = editingEventId;
          allEvents[idx] = eventData;
        }
      } else {
        eventData.id = Date.now();
        allEvents.push(eventData);
      }

      saveEvents();
      renderEvents();
      hideEventForm();
      showNotification('Event "' + title + '" saved!', 'success');
    }

    function deleteEvent(id) {
      var ev = allEvents.find(function(e) { return e.id === id; });
      if (!ev) return;
      if (!confirm('Delete "' + ev.title + '"?')) return;
      allEvents = allEvents.filter(function(e) { return e.id !== id; });
      saveEvents();
      renderEvents();
      showNotification('Event deleted', 'success');
    }

    function showNotification(msg, type) {
      var n = document.createElement('div');
      n.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:12px 24px;border-radius:8px;color:white;z-index:10000;box-shadow:0 4px 12px rgba(0,0,0,.3);font-family:sans-serif;font-size:14px;animation:slideIn .3s ease-out;';
      if (type === 'success') { n.style.backgroundColor = '#16a34a'; n.innerHTML = '&#9989; ' + msg; }
      else { n.style.backgroundColor = '#3b82f6'; n.innerHTML = '&#8505; ' + msg; }
      document.body.appendChild(n);
      setTimeout(function() { n.style.opacity = '0'; n.style.transition = 'opacity .5s'; setTimeout(function() { n.remove(); }, 500); }, 3000);
    }

    /* ── Countdown Timer ── */
    setInterval(function() {
      allEvents.forEach(function(ev) {
        if (ev.status === 'ended' || !ev.end) return;
        var endDate = new Date(ev.end + 'T23:59:59');
        var now = new Date();
        var diff = endDate - now;
        if (diff <= 0) return;
        var days  = Math.floor(diff / 86400000);
        var hours = Math.floor((diff % 86400000) / 3600000);
        var mins  = Math.floor((diff % 3600000) / 60000);
        var secs  = Math.floor((diff % 60000) / 1000);
        var d = document.getElementById('cd-d-' + ev.id);
        var h = document.getElementById('cd-h-' + ev.id);
        var m = document.getElementById('cd-m-' + ev.id);
        var s = document.getElementById('cd-s-' + ev.id);
        if (d) d.textContent = days;
        if (h) h.textContent = hours;
        if (m) m.textContent = mins;
        if (s) s.textContent = secs;
      });
    }, 1000);

    /* ── Init ── */
    document.addEventListener("DOMContentLoaded", async () => {
      isAdmin = await Auth.isLoggedIn();
      if (isAdmin) {
        document.getElementById('adminBar').style.display = 'flex';
        document.getElementById('adminAddEventBar').style.display = 'flex';
      }
      loadEvents();
      renderEvents();
    });
  </script>
</body>
</html>
