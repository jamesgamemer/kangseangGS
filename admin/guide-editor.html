<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide Editor</title>
  <link rel="stylesheet" href="../css/guide-system.css">
  <style>
    body {
      background: #0f1117;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .editor-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .editor-breadcrumb {
      margin-bottom: 20px;
      font-size: 14px;
    }

    .editor-breadcrumb a {
      color: #00a8ff;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .editor-breadcrumb a:hover {
      opacity: 0.8;
    }

    .editor-breadcrumb span {
      color: #b0b0b0;
      margin: 0 8px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #b0b0b0;
    }

    .error {
      background: rgba(244, 67, 54, 0.1);
      border-left: 4px solid #f44336;
      padding: 20px;
      border-radius: 8px;
      color: #ff6b6b;
      margin: 20px 0;
    }

    .success {
      background: rgba(76, 175, 80, 0.1);
      border-left: 4px solid #4caf50;
      padding: 20px;
      border-radius: 8px;
      color: #66bb6a;
      margin: 20px 0;
    }

    .editor-meta {
      background: #232734;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #2a2a2a;
    }

    .editor-meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 15px;
    }

    .editor-meta-row:last-child {
      margin-bottom: 0;
    }

    .editor-meta-field {
      display: flex;
      flex-direction: column;
    }

    .editor-meta-label {
      font-size: 13px;
      font-weight: 600;
      color: #00a8ff;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .editor-meta-input {
      background: #1b1e26;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 10px 12px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
    }

    .editor-meta-input:focus {
      outline: none;
      border-color: #00a8ff;
      box-shadow: 0 0 0 3px rgba(0, 168, 255, 0.1);
    }

    .editor-meta-textarea {
      background: #1b1e26;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 10px 12px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      min-height: 80px;
      resize: vertical;
    }

    .editor-meta-textarea:focus {
      outline: none;
      border-color: #00a8ff;
      box-shadow: 0 0 0 3px rgba(0, 168, 255, 0.1);
    }

    .editor-cover-preview {
      margin-top: 10px;
      max-width: 200px;
    }

    .editor-cover-preview img {
      width: 100%;
      border-radius: 4px;
    }

    .drag-handle {
      cursor: grab;
      color: #00a8ff;
      margin-right: 10px;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    @media (max-width: 768px) {
      .editor-meta-row {
        grid-template-columns: 1fr;
      }

      .blocks-editor {
        flex-direction: column;
      }

      .blocks-sidebar {
        width: 100%;
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="editor-breadcrumb">
      <a href="../guides.html">Guides</a>
      <span>/</span>
      <span id="breadcrumb-title">New Guide</span>
    </div>

    <div id="editor-content" class="loading">
      <p>Loading editor...</p>
    </div>
  </div>

  <script src="../components/block-system.js"></script>
  <script src="../components/guide-renderer.js"></script>
  <script src="../components/media-uploader.js"></script>
  <script src="../js/guide-editor.js"></script>
</body>
</html>
