<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guides</title>
  <link rel="stylesheet" href="css/guide-system.css">
  <style>
    body {
      background: #0f1117;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .page-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      font-size: 36px;
      font-weight: 700;
      margin: 0 0 30px 0;
      color: #ffffff;
    }

    .page-subtitle {
      font-size: 16px;
      color: #b0b0b0;
      margin: 0 0 40px 0;
      line-height: 1.6;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #b0b0b0;
    }

    .error {
      background: rgba(244, 67, 54, 0.1);
      border-left: 4px solid #f44336;
      padding: 20px;
      border-radius: 8px;
      color: #ff6b6b;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <h1 class="page-title">Guides</h1>
    <p class="page-subtitle">Browse our comprehensive collection of game guides, tips, and strategies.</p>
    
    <div id="guides-container" class="loading">
      <p>Loading guides...</p>
    </div>
  </div>

  <script src="components/block-system.js"></script>
  <script src="components/guide-renderer.js"></script>
  <script src="js/guides-list.js"></script>
</body>
</html>
